<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical AI Assistant</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="chat-container">
        <header class="chat-header">
            <div class="logo">
                <i class="fa-solid fa-heart-pulse"></i>
            </div>
            <div class="title-container">
                <h1>Medical AI Assistant</h1>
                <span class="status"><span class="dot"></span> Online</span>
            </div>
        </header>

        <main class="chat-box" id="chat-box">
            <div class="message bot">
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="bubble">
                    Hello! I am your AI Medical Assistant. How can I help you today?
                </div>
            </div>
        </main>

        <footer class="chat-input-area">
            <form id="chat-form" onsubmit="sendMessage(event)">
                <input type="text" id="user-input" placeholder="Type your medical query here..." autocomplete="off" required>
                <button type="submit" id="send-btn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </footer>
    </div>

    <!-- Custom JS -->
    <script src="{{ url_for('static', path='/script.js') }}"></script>
</body>
</html>
